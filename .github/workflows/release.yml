name: Build & Release (multi-platform)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.0.4). Required for workflow_dispatch."
        required: true
        type: string

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.10"
  APP_NAME: "BambooPass"
  ENTRYPOINT: "bamboopass_entry.py"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows-x64
            runner: windows-latest
            ext: ".exe"
          - target: linux-x64
            runner: ubuntu-22.04
            ext: ""
          - target: linux-arm64
            runner: ubuntu-22.04-arm
            ext: ""
          - target: macos-intel
            runner: macos-15-intel
            ext: ""
          - target: macos-arm64
            runner: macos-14
            ext: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # On tag push: github.ref is refs/tags/vX.Y.Z
          # On workflow_dispatch: inputs.tag is vX.Y.Z
          ref: ${{ (github.event_name == 'workflow_dispatch' && inputs.tag) || github.ref }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: macOS: ensure Homebrew OpenSSL is present (fix Nuitka dependency scan)
        if: runner.os == 'macOS'
        shell: bash
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
        run: |
          set -euxo pipefail
          # Remove potentially conflicting OpenSSL shim/symlink files on the runner
          sudo rm -f /usr/local/lib/libssl.dylib /usr/local/lib/libcrypto.dylib /opt/homebrew/lib/libssl.dylib /opt/homebrew/lib/libcrypto.dylib || true
          # GitHub's prebuilt CPython (setup-python) on macOS can link _hashlib against Homebrew OpenSSL.
          # Nuitka's dependency scan fails if libssl.3.dylib is missing.
          brew list openssl@3 >/dev/null 2>&1 || brew install openssl@3
          # Keep expected /usr/local/opt or /opt/homebrew/opt symlinks in place.
          brew link --overwrite --force openssl@3 || true
          PREFIX="$(brew --prefix openssl@3)"
          ls -la "$PREFIX/lib/libssl.3.dylib" "$PREFIX/lib/libcrypto.3.dylib"

      - name: Resolve TAG / VERSION
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          VERSION="${TAG#v}"

          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

          echo "Resolved TAG=$TAG VERSION=$VERSION"

      - name: Inject version into source (no sed)
        shell: bash
        run: |
          python - <<'PY'
          import os, re
          from pathlib import Path

          tag = os.environ["TAG"]
          version = os.environ["VERSION"]

          # Runtime version used by the app
          bv = Path("bamboopass/_build_version.py")
          bv.write_text(f'__version__ = "{version}"\n', encoding="utf-8")

          # Optional: make package metadata match (helps importlib.metadata)
          pyproject = Path("pyproject.toml")
          if pyproject.exists():
              txt = pyproject.read_text(encoding="utf-8")
              new_txt, n = re.subn(
                  r'(?m)^version\s*=\s*"[^"]+"',
                  f'version = "{version}"',
                  txt,
                  count=1,
              )
              if n:
                  pyproject.write_text(new_txt, encoding="utf-8")
              else:
                  print("WARN: Could not find version field in pyproject.toml")

          print(f"Injected VERSION={version} (from TAG={tag})")
          PY

      - name: Install build dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          # zstandard is required for Nuitka onefile compression
          pip install nuitka zstandard PySide6 platformdirs
          pip install -e .

      - name: Build (Nuitka onefile)
        shell: bash
        run: |
          python -m nuitka \
            --mode=onefile \
            --enable-plugin=pyside6 \
            --assume-yes-for-downloads \
            --output-dir=dist \
            "${ENTRYPOINT}"

      - name: Prepare release files
        shell: bash
        run: |
          mkdir -p release

          # Nuitka onefile output is usually:
          #  - dist/<entry>.exe (Windows)
          #  - dist/<entry>.bin (Linux/macOS)
          #  - sometimes dist/<entry> (depending on options)
          if [ -f "dist/bamboopass_entry.exe" ]; then
            BIN_PATH="dist/bamboopass_entry.exe"
          elif [ -f "dist/bamboopass_entry.bin" ]; then
            BIN_PATH="dist/bamboopass_entry.bin"
          elif [ -f "dist/bamboopass_entry" ]; then
            BIN_PATH="dist/bamboopass_entry"
          else
            echo "ERROR: Build output not found in dist/"
            ls -la dist || true
            exit 1
          fi

          OUT_LATEST="${APP_NAME}-${{ matrix.target }}${{ matrix.ext }}"
          OUT_VERSIONED="${APP_NAME}-${TAG}-${{ matrix.target }}${{ matrix.ext }}"

          cp "$BIN_PATH" "release/${OUT_LATEST}"
          cp "$BIN_PATH" "release/${OUT_VERSIONED}"

          # Make sure it's executable on Unix-y runners
          if [ "${{ matrix.ext }}" = "" ]; then
            chmod +x "release/${OUT_LATEST}" "release/${OUT_VERSIONED}" || true
          fi

          # Per-target checksum file (avoids collisions between matrix jobs)
          (
            sha256sum "release/${OUT_LATEST}" "release/${OUT_VERSIONED}" 2>/dev/null \
              || shasum -a 256 "release/${OUT_LATEST}" "release/${OUT_VERSIONED}"
          ) > "release/SHA256SUMS-${{ matrix.target }}.txt"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: release/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Resolve TAG for publishing
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "Publishing assets to tag: $TAG"

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: release/*
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
