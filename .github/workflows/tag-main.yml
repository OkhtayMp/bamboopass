name: Tag main

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name (e.g. v0.0.1)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: tag-main
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag name
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.]+)?$ ]]; then
            echo "Invalid tag: $TAG (expected vMAJOR.MINOR.PATCH)" >&2
            exit 1
          fi
          echo "TAG=$TAG" >> "$GITHUB_ENV"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version files on main
        shell: bash
        run: |
          set -euxo pipefail
          VERSION_NO_V="${TAG#v}"
          echo "$TAG" > VERSION
          export VERSION_NO_V
          python - <<'PY'
          from pathlib import Path
          import os, re
          v = os.environ["VERSION_NO_V"]
          Path("bamboopass/_build_version.py").write_text(f"__version__ = '{v}'\n")
          p = Path("pyproject.toml")
          txt = p.read_text(encoding="utf-8")
          txt2 = re.sub(r'(?m)^version\s*=\s*"[^"]+"\s*$', f'version = "{v}"', txt)
          p.write_text(txt2, encoding="utf-8")
          PY

      - name: Commit version bump (if needed)
        shell: bash
        run: |
          set -euxo pipefail
          git add VERSION bamboopass/_build_version.py pyproject.toml
          if git diff --cached --quiet; then
            echo "No version changes to commit."
            exit 0
          fi
          git commit -m "chore: bump version to $TAG"
          git push origin HEAD:main

      - name: Ensure tag does not already exist
        run: |
          git fetch --tags
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag already exists: $TAG" >&2
            exit 1
          fi

      - name: Create annotated tag on main HEAD
        run: |
          git tag -a "$TAG" -m "Release $TAG"

      - name: Push tag
        run: |
          git push origin "$TAG"
